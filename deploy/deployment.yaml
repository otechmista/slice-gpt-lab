apiVersion: v1
kind: Namespace
metadata:
  name: llm-lessons
  labels:
    app.kubernetes.io/name: llm-lessons
    app.kubernetes.io/part-of: llm-lessons
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-lessons-api
  namespace: llm-lessons
  labels:
    app: llm-lessons-api
    app.kubernetes.io/name: llm-lessons-api
    app.kubernetes.io/part-of: llm-lessons
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: llm-lessons-api
  template:
    metadata:
      labels:
        app: llm-lessons-api
        app.kubernetes.io/name: llm-lessons-api
        app.kubernetes.io/part-of: llm-lessons
    spec:
      containers:
        - name: api
          image: ghcr.io/otechmista/mini-gpt-study:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: llm-lessons-api
  namespace: llm-lessons
  labels:
    app: llm-lessons-api
    app.kubernetes.io/name: llm-lessons-api
    app.kubernetes.io/part-of: llm-lessons
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector:
    app: llm-lessons-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-lessons-api
  namespace: llm-lessons
  labels:
    app: llm-lessons-api
    app.kubernetes.io/name: llm-lessons-api
    app.kubernetes.io/part-of: llm-lessons
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ingressClassName: traefik
  rules:
    - host: api.camilomelo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-lessons-api
                port:
                  number: 8000
