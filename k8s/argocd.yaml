apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-lessons-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/otechmista/mini-gpt-study.git
    targetRevision: main
    path: k8s
    directory:
      include: "*.yaml"
      exclude: argocd.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: llm-lessons
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
